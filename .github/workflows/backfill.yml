name: MOLIT Backfill

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *" # 매일 03:00 KST

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check environment
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node --version
          npx tsx --version
          echo "MOLIT_API_KEY: $([ -n "$MOLIT_API_KEY" ] && echo 'SET' || echo 'MISSING')"
          echo "SUPABASE_URL: $([ -n "$SUPABASE_URL" ] && echo 'SET' || echo 'MISSING')"
          echo "SUPABASE_SERVICE_ROLE_KEY: $([ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && echo 'SET' || echo 'MISSING')"

      - name: Run backfill
        run: npx tsx --tsconfig scripts/tsconfig.json scripts/backfill.ts
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
